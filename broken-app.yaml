apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor-service
  namespace: default
  labels:
    app: payment-processor

spec:
  replicas: 1

  selector:
    matchLabels:
      app: payment-processor

  template:
    metadata:
      labels:
        app: payment-processor

    spec:
      containers:
      - name: payment-api

        # Invalid image tag to intentionally trigger ImagePullBackOff
        image: nginx:alpine-v99.32.12

        ports:
        - containerPort: 8080

        env:
        - name: APP_MODE
          value: "production"

        - name: DATABASE_URL
          value: ""

        - name: REDIS_HOST
          value: ""
